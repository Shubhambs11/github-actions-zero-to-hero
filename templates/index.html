<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Hero</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:Segoe UI,Roboto,Arial;
color:#fff;
}

.container{
text-align:center;
max-width:900px;
padding:40px;
}

h1{
font-size:3rem;
margin-bottom:10px;
background:linear-gradient(90deg,#00d2ff,#7b2ff7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.badge{
display:inline-block;
margin:10px 0 30px;
padding:6px 20px;
border:1px solid #7b2ff7;
border-radius:30px;
font-size:14px;
color:#c4b5fd;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:14px;
padding:25px;
min-width:180px;
transition:0.3s;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card span{
font-size:12px;
letter-spacing:2px;
color:#9ca3af;
display:block;
margin-bottom:5px;
}

.card strong{
font-size:20px;
}

.tech-section{
margin-top:20px;
}

.tech-title{
font-size:1.4rem;
margin-bottom:20px;
color:#cbd5f5;
}

.logos{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.logos img{
width:55px;
height:55px;
transition:0.3s;
filter:drop-shadow(0px 0px 6px rgba(0,0,0,0.5));
}

.logos img:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<div class="container">

<h1>DevOps Learning</h1>
<div class="badge">🚀 Day 35 of Learning</div>

<div class="cards">

<div class="card">
<span>Framework</span>
<strong>Flask 3.1</strong>
</div>

<div class="card">
<span>Runtime</span>
<strong>Python 3.14</strong>
</div>

<div class="card">
<span>Deploy</span>
<strong>AWS ECS</strong>
</div>

</div>

<div class="tech-section">

<div class="tech-title">⚙ DevOps Stack</div>

<div class="logos">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/terraform/terraform-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/ansible/ansible-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/githubactions/githubactions-original.svg">

</div>

</div>

</div>

</body>
</html>
